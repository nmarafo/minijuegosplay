<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lucha Canaria: Desafío de Puntales</title>
    <style>
        body { margin: 0; background: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #e9d1a3; border: 5px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { position: absolute; top: 20px; font-size: 24px; text-shadow: 2px 2px #000; }
        .controls { margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>
    <div class="ui">Equilibrio: <span id="health">100</span>%</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="controls">Pulsa 'Z' para Maña | 'X' para Empujar</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const healthEl = document.getElementById('health');

        let health = 100;
        let shake = 0;

        // Carga de Assets (GitHub Raw URLs)
        const GITHUB_BASE = 'https://github.com/nmarafo/minijuegosplay/blob/main/minigames/arcade/lucha_canaria/assets/';
        
        const imgLuchador = new Image();
        imgLuchador.src = GITHUB_BASE + 'spritesheets/luchador_fase1.png?raw=true';
        const imgTerrero = new Image();
        imgTerrero.src = GITHUB_BASE + 'tilesets/tileset_lucha.png?raw=true';

        let imagesLoaded = 0;
        const totalImages = 2;
        imgLuchador.onload = imgTerrero.onload = () => { imagesLoaded++; };

        function draw() {
            ctx.save();
            if(shake > 0) {
                ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
                shake *= 0.9;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Dibujar Terrero (Fondo)
            if (imagesLoaded >= 1) {
                // Dibujamos una celda del tileset como fondo de arena (suponiendo celda 0,0)
                // ctx.drawImage(image, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight);
                ctx.drawImage(imgTerrero, 0, 0, 256, 256, 0, 0, canvas.width, canvas.height);
            }

            // Círculo del terrero
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 15;
            ctx.beginPath();
            ctx.arc(400, 300, 260, 0, Math.PI*2);
            ctx.stroke();

            // 2. Dibujar Luchadores (Sprites)
            if (imagesLoaded >= 2) {
                // Protagonista (Fila 1: Idle, Frame 1)
                ctx.drawImage(imgLuchador, 0, 0, 256, 256, 250, 200, 200, 200);
                
                // Oponente (Espejo o mismo sprite por ahora)
                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(imgLuchador, 0, 0, 256, 256, -550, 200, 200, 200);
                ctx.restore();
            } else {
                // Fallback si no cargan
                ctx.fillStyle = '#fff';
                ctx.fillRect(320, 250, 60, 100);
            }

            ctx.restore();
        }

        function update() {
            if(health <= 0) return;
            draw();
            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'z') {
                shake = 10;
            }
            if(e.key.toLowerCase() === 'x') {
                health -= 5;
                healthEl.innerText = health;
                if(health <= 0) alert("¡Caída! El oponente gana esta luchada.");
            }
        });

        update();
    </script>
</body>
</html>
