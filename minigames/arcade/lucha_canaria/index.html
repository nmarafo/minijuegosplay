<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lucha Canaria: Desafío de Puntales</title>
    <style>
        body { margin: 0; background: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #e9d1a3; border: 5px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { position: absolute; top: 20px; font-size: 24px; text-shadow: 2px 2px #000; }
        .controls { margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>
    <div class="ui">Equilibrio: <span id="health">100</span>%</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="controls">Pulsa 'Z' para Maña | 'X' para Empujar</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const healthEl = document.getElementById('health');

        let health = 100;
        let shake = 0;

        // Carga de Assets (GitHub Raw URLs)
        const GITHUB_BASE = 'https://github.com/nmarafo/minijuegosplay/blob/main/minigames/arcade/lucha_canaria/assets/';
        
        const assets = {
            luchador: GITHUB_BASE + 'spritesheets/luchador_fase1.png?raw=true',
            terrero: GITHUB_BASE + 'tilesets/tileset_lucha.png?raw=true',
            p4: GITHUB_BASE + 'parallax/layer4_far.png?raw=true',
            p3: GITHUB_BASE + 'parallax/layer3_mid.png?raw=true',
            p2: GITHUB_BASE + 'parallax/layer2_foreground.png?raw=true',
            p1: GITHUB_BASE + 'parallax/layer1_detail.png?raw=true'
        };

        const images = {};
        let imagesLoaded = 0;
        const totalImages = Object.keys(assets).length;

        Object.keys(assets).forEach(key => {
            images[key] = new Image();
            images[key].src = assets[key];
            images[key].onload = () => { imagesLoaded++; };
        });

        let scrollX = 0;
        let frameTick = 0;

        function draw() {
            ctx.save();
            if(shake > 0) {
                ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
                shake *= 0.9;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (imagesLoaded < totalImages) {
                ctx.fillStyle = '#fff';
                ctx.font = '20px sans-serif';
                ctx.fillText(`Cargando Arena... ${imagesLoaded}/${totalImages}`, 300, 300);
                requestAnimationFrame(draw);
                return;
            }

            // 1. Dibujar Paralaje (Velocidades según parallax_report.md)
            // Capa 4: Cielo (0.05x) - Alineación Top
            ctx.drawImage(images.p4, 0, 0, canvas.width, canvas.height);

            // Capa 3: Palmeras/Casas (0.25x) - Alineación Base
            const p3X = (scrollX * 0.25) % canvas.width;
            ctx.drawImage(images.p3, p3X, 0, canvas.width, canvas.height);
            ctx.drawImage(images.p3, p3X + canvas.width, 0, canvas.width, canvas.height);
            
            // Capa 2: Gradas/Público (0.60x) - Alineación Base
            const p2X = (scrollX * 0.60) % canvas.width;
            ctx.drawImage(images.p2, p2X, 0, canvas.width, canvas.height);
            ctx.drawImage(images.p2, p2X + canvas.width, 0, canvas.width, canvas.height);

            // 2. Dibujar Terrero (Fila 1, Col 1 según tileset_metadata.md)
            // Arena base
            ctx.drawImage(images.terrero, 0, 0, 256, 256, 0, 0, canvas.width, canvas.height);

            // Círculo del terrero (Lógica visual)
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 15;
            ctx.beginPath();
            ctx.arc(400, 320, 260, 0, Math.PI*2);
            ctx.stroke();

            // 3. Dibujar Luchadores (Animación basada en 256px de animations_guide.md)
            const currentFrame = Math.floor(frameTick / 10) % 4;
            const sx = currentFrame * 256;
            const sy = 0; // Fila 1: Idle

            // Protagonista (Anclaje base en Y=450 aprox)
            ctx.drawImage(images.luchador, sx, sy, 256, 256, 220, 250, 256, 256);
            
            // Oponente (Espejo)
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(images.luchador, sx, sy, 256, 256, -580, 250, 256, 256);
            ctx.restore();

            // 4. Detalle frontal (1.00x según parallax_report.md)
            const p1X = (scrollX * 1.00) % canvas.width;
            ctx.drawImage(images.p1, p1X, 0, canvas.width, canvas.height);
            ctx.drawImage(images.p1, p1X + canvas.width, 0, canvas.width, canvas.height);

            scrollX -= 0.5;
            frameTick++;
            ctx.restore();
        }

        function update() {
            if(health <= 0) return;
            draw();
            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'z') {
                shake = 10;
            }
            if(e.key.toLowerCase() === 'x') {
                health -= 5;
                healthEl.innerText = health;
                if(health <= 0) alert("¡Caída! El oponente gana esta luchada.");
            }
        });

        update();
    </script>
</body>
</html>
