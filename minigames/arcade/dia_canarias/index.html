<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Salto del Pastor: Desafío Canario</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            background: #87CEEB;
            border: 4px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            image-rendering: pixelated;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            text-shadow: 2px 2px #000;
        }
        .instructions {
            margin-top: 10px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="ui">Puntos: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="instructions">Pulsa ESPACIO para saltar con el garrote</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Configuración de Assets (GitHub Raws)
        const BASE_URL = 'https://raw.githubusercontent.com/nmarafo/minijuegosplay/main/minigames/arcade/dia_canarias/assets/';
        
        const assets = {
            spritesheet: BASE_URL + 'spritesheets/pastor_fase1.png',
            parallax1: BASE_URL + 'parallax/layer1_detail.png',
            parallax2: BASE_URL + 'parallax/layer2_foreground.png',
            parallax3: BASE_URL + 'parallax/layer3_mid.png',
            parallax4: BASE_URL + 'parallax/layer4_far.png',
            tileset: BASE_URL + 'tilesets/tileset_dia_canarias.png'
        };

        // Estado del Juego
        let score = 0;
        let gameActive = true;
        let scrollX = 0;

        const player = {
            x: 100,
            y: 450,
            width: 64,
            height: 64,
            dy: 0,
            jumpForce: -15,
            gravity: 0.6,
            isGrounded: true,
            frame: 0,
            animTimer: 0
        };

        const platforms = [
            {x: 0, y: 520, w: 1000, h: 80},
            {x: 400, y: 400, w: 200, h: 20},
            {x: 700, y: 300, w: 200, h: 20},
            {x: 1000, y: 450, w: 200, h: 20}
        ];

        function drawPlayer() {
            // Placeholder: Rectángulo hasta que los assets carguen
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Dibujar el "garrote"
            ctx.strokeStyle = '#663300';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width/2, player.y + 10);
            ctx.lineTo(player.x + player.width + 10, player.y + player.height);
            ctx.stroke();
        }

        function drawPlatforms() {
            ctx.fillStyle = '#4a2c1a';
            platforms.forEach(p => {
                ctx.fillRect(p.x - scrollX, p.y, p.w, p.h);
            });
        }

        function update() {
            if (!gameActive) return;

            // Gravedad
            player.dy += player.gravity;
            player.y += player.dy;

            // Suelo básico
            if (player.y > 520 - player.height) {
                player.y = 520 - player.height;
                player.dy = 0;
                player.isGrounded = true;
            }

            // Movimiento de cámara (scroll)
            scrollX += 2;
            score = Math.floor(scrollX / 10);
            scoreElement.innerText = score;

            // Reciclar plataformas (básico)
            platforms.forEach(p => {
                if (p.x - scrollX < -p.w) {
                    p.x += 1200;
                    p.y = 200 + Math.random() * 300;
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Fondo (Cielo)
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#87CEEB');
            grad.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawPlatforms();
            drawPlayer();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && player.isGrounded) {
                player.dy = player.jumpForce;
                player.isGrounded = false;
            }
        });

        gameLoop();
    </script>
</body>
</html>
