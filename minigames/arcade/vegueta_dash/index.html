<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vegueta Dash v3.5 - Fix de Carga</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: 'Outfit', 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #2c3e50; border: 6px solid #d4af37; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.9); cursor: default; }
        .ui-overlay { position: absolute; top: 30px; width: 760px; display: flex; justify-content: space-between; padding: 0 20px; font-size: 24px; text-shadow: 2px 2px #000; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        .score-box { color: #ffd700; }
        .ammo-box { color: #8bc34a; }
        .phase-box { color: #03a9f4; text-transform: uppercase; }
        .lives-box { color: #ff4d4d; }
        .instructions-bar { position: absolute; bottom: 20px; color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; opacity: 0; transition: opacity 0.5s; }
        
        #loading-screen, #start-screen { position: absolute; width: 800px; height: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; border-radius: 8px; overflow: hidden; }
        #loading-screen { background: #000; }
        
        #start-screen { 
            display: none;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('../../../site/assets/thumbnails/vegueta_dash.png');
            background-size: cover;
            background-position: center;
        }

        .glass-panel { 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(10px); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            max-width: 80%;
        }

        h1 { margin: 0; color: #d4af37; font-size: 48px; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        .synopsis { margin: 15px 0; color: #eee; line-height: 1.6; font-size: 18px; }
        .controls-info { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .key { background: #333; padding: 5px 10px; border-radius: 5px; border-bottom: 3px solid #000; font-family: monospace; color: #ffd700; }
        
        .play-btn { 
            background: #d4af37; color: #000; border: none; padding: 15px 50px; font-size: 24px; font-weight: bold; 
            border-radius: 50px; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }
        .play-btn:hover { transform: scale(1.1); background: #fff; box-shadow: 0 0 30px rgba(212, 175, 55, 0.8); }

        .credits { margin-top: 25px; font-size: 12px; color: #888; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }

        .loader { border: 4px solid #333; border-top: 4px solid #d4af37; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <div id="loading-text">Cargando Vegueta... 0%</div>
    </div>

    <div id="start-screen">
        <div class="glass-panel">
            <h1>Vegueta Dash</h1>
            <p class="synopsis">Recupera los tesoros perdidos de Cristóbal Colón. ¡Usa tus papas con sabiduría!</p>
            
            <div class="controls-info">
                <div><span class="key">ESPACIO</span> SALTAR</div>
                <div><span class="key">↓</span> LANZAR PAPA</div>
            </div>

            <button class="play-btn" onclick="initGame()">Jugar</button>

            <div class="credits">
                Idea: MinijuegosPlay Team | Dev: Antigravity Engine v3.5
            </div>
        </div>
    </div>

    <div class="ui-overlay" id="game-ui">
        <div class="lives-box" id="lives-display">❤️❤️❤️</div>
        <div class="phase-box" id="phase-display">FASE 1</div>
        <div class="ammo-box" id="ammo-display">🥔 5</div>
        <div class="score-box">PUNTOS: <span id="score">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="instructions-bar" id="game-instr">ESPACIO: SALTAR | FLECHA ABAJO: LANZAR PAPA | ESC: PAUSA</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives-display');
        const ammoEl = document.getElementById('ammo-display');
        const phaseEl = document.getElementById('phase-display');

        const images = {
            hero: new Image(),
            dog: new Image(),
            pigeon: new Image(),
            potato: new Image(),
            p1: new Image(),
            p2: new Image(),
            p3: new Image(),
            p4: new Image(),
            tiles: new Image()
        };

        let imagesLoaded = 0;
        const totalImages = Object.keys(images).length;

        function checkImagesLoaded() {
            imagesLoaded++;
            loadingText.innerText = `Cargando Vegueta... ${Math.floor((imagesLoaded/totalImages)*100)}%`;
            if(imagesLoaded === totalImages) {
                loadingScreen.style.display = 'none';
                startScreen.style.display = 'flex';
            }
        }

        const GITHUB_BASE = 'https://raw.githubusercontent.com/nmarafo/minijuegosplay/main/minigames/arcade/vegueta_dash/assets/';
        const v = Date.now();
        images.hero.src = GITHUB_BASE + 'spritesheets/explorador_fase2.png?v=' + v;
        images.dog.src = GITHUB_BASE + 'spritesheets/presa_fase1.png?v=' + v;
        images.pigeon.src = GITHUB_BASE + 'spritesheets/paloma_vegueta.png?v=' + v;
        images.potato.src = GITHUB_BASE + 'spritesheets/papa.png?v=' + v;
        images.p1.src = GITHUB_BASE + 'parallax/layer1_detail.png?v=' + v;
        images.p2.src = GITHUB_BASE + 'parallax/layer2_foreground.png?v=' + v;
        images.p3.src = GITHUB_BASE + 'parallax/layer3_mid.png?v=' + v;
        images.p4.src = GITHUB_BASE + 'parallax/layer4_far.png?v=' + v;
        images.tiles.src = GITHUB_BASE + 'tilesets/tileset_vegueta.png?v=' + v;

        Object.values(images).forEach(img => img.onload = checkImagesLoaded);

        const startScreen = document.getElementById('start-screen');
        const gameUI = document.getElementById('game-ui');
        const gameInstr = document.getElementById('game-instr');

        let gameState = 'START';
        let score = 0;
        let lives = 3;
        let ammo = 5;
        let currentPhase = 1;
        let scrollX = 0;
        let playerY = 350;
        let playerVY = 0;
        let isJumping = false;
        let frameCount = 0;
        let invulnerableFrames = 0;

        let thrownPotatoes = [];
        let dogFleeing = false;
        let dogFleeTimer = 0;
        let dogXPos = 800;

        function updateUI() {
            scoreEl.innerText = score;
            livesEl.innerText = "❤️".repeat(lives);
            ammoEl.innerText = "🥔 " + ammo;
            phaseEl.innerText = "FASE " + currentPhase;
        }

        function initGame() {
            startScreen.style.display = 'none';
            gameUI.style.opacity = '1';
            gameInstr.style.opacity = '1';
            gameState = 'PLAYING';
            lives = 3;
            ammo = 5;
            score = 0;
            currentPhase = 1;
            updateUI();
            animate();
        }

        function throwPotato() {
            if (ammo > 0) {
                ammo--;
                thrownPotatoes.push({
                    x: 200,
                    y: playerY + 50,
                    vx: 10,
                    vy: -5,
                    rot: 0
                });
                updateUI();
            }
        }

        function animate() {
            if(gameState !== 'PLAYING') return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.drawImage(images.p4, 0, 0, canvas.width, canvas.height);
            drawParallax(images.p3, 0.2, 0);
            drawParallax(images.p2, 0.5, 0);

            for(let i = 0; i < 5; i++) {
                ctx.drawImage(images.tiles, 0, 30, 256, 226, (i * 256) + (scrollX % 256), 530, 256, 226);
                ctx.drawImage(images.tiles, 256, 30, 256, 226, (i * 256) + (scrollX % 256), 600, 256, 226);
            }

            const frame = Math.floor(frameCount / 6) % 4;
            const spriteW = 256;
            const spriteH = 256;
            const crop = 4;
            
            let actionY = 512; 
            if(isJumping) actionY = 768; 
            if(invulnerableFrames > 0) actionY = 0;

            ctx.save();
            let shakeX = 0;
            if (invulnerableFrames > 0) {
                if (Math.floor(frameCount / 4) % 2 === 0) ctx.globalAlpha = 0.3;
                shakeX = Math.sin(frameCount * 0.5) * 5;
                invulnerableFrames--;
            }
            ctx.drawImage(images.hero, (frame * spriteW) + crop, actionY + crop, spriteW - (crop * 2), spriteH - (crop * 2), 150 + shakeX, playerY, 180, 180);
            ctx.restore();

            if (!dogFleeing) {
                dogXPos = 800 - ((Math.abs(scrollX) * 1.2) % 1600); 
            } else {
                dogXPos += 15;
                if (dogXPos > 1000) {
                    dogFleeing = false;
                    dogXPos = -200;
                }
            }

            ctx.save();
            ctx.translate(dogXPos + 90, 440);
            if (!dogFleeing) ctx.scale(-1, 1);
            else ctx.scale(1, 1);
            ctx.drawImage(images.dog, (frame * spriteW) + crop, 512 + crop, spriteW - (crop * 2), spriteH - (crop * 2), 0, 0, 90, 90);
            ctx.restore();

            let pigeonX = 800 - ((Math.abs(scrollX) * 1.6) % 1800);
            let pigeonY = 150 + Math.sin(frameCount * 0.1) * 60;
            ctx.save();
            ctx.translate(pigeonX + 80, pigeonY);
            ctx.scale(-1, 1);
            ctx.drawImage(images.pigeon, (frame * spriteW) + crop, 0 + crop, spriteW - (crop * 2), spriteH - (crop * 2), 0, 0, 80, 80);
            ctx.restore();

            thrownPotatoes.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.4;
                p.rot += 0.2;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.drawImage(images.potato, 0, 0, 256, 256, -25, -25, 50, 50);
                ctx.restore();

                const pRect = { x: p.x - 20, y: p.y - 20, w: 40, h: 40 };
                const dRect = { x: dogXPos, y: 440, w: 90, h: 90 };

                if (!dogFleeing && checkCollision(pRect, dRect)) {
                    dogFleeing = true;
                    score += 500;
                    thrownPotatoes.splice(index, 1);
                }
                if (p.y > 600 || p.x > 800) thrownPotatoes.splice(index, 1);
            });

            const pHit = { x: 190, y: playerY + 30, w: 80, h: 120 };
            const dHit = { x: dogXPos + 15, y: 450, w: 60, h: 60 };
            const piHit = { x: pigeonX + 10, y: pigeonY + 10, w: 60, h: 40 };

            if (invulnerableFrames === 0 && ((!dogFleeing && checkCollision(pHit, dHit)) || checkCollision(pHit, piHit))) {
                takeDamage();
            }

            drawParallax(images.p1, 1.0, 0, 1.2);

            if(isJumping) {
                playerY += playerVY;
                playerVY += 0.8;
                if(playerY >= 350) {
                    playerY = 350;
                    isJumping = false;
                }
            }

            if(frameCount % 10 === 0) {
                score += 10;
                updateUI();
                
                let newPhase = Math.floor(score / 1000) + 1;
                if (newPhase > currentPhase) {
                    currentPhase = newPhase;
                    ammo = 5;
                    updateUI();
                }
            }

            scrollX -= 4;
            frameCount++;
            requestAnimationFrame(animate);
        }

        function checkCollision(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function takeDamage() {
            lives--;
            updateUI();
            invulnerableFrames = 60;
            if (lives <= 0) gameOver();
        }

        function gameOver() {
            gameState = 'START';
            startScreen.style.display = 'flex';
            gameUI.style.opacity = '0';
            gameInstr.style.opacity = '0';
            thrownPotatoes = [];
            dogFleeing = false;
        }

        function drawParallax(img, speed, y = 0, scale = 1.0) {
            const w = canvas.width * scale;
            const h = canvas.height * scale;
            const x = Math.floor((scrollX * speed) % w);
            ctx.drawImage(img, x, y, w + 1, h);
            ctx.drawImage(img, x + w, y, w + 1, h);
            if (x + w < canvas.width) ctx.drawImage(img, x + (w * 2), y, w + 1, h);
        }

        window.addEventListener('keydown', (e) => {
            if(gameState !== 'PLAYING') return;
            if(e.code === 'Space' && !isJumping) {
                isJumping = true;
                playerVY = -18;
            }
            if(e.code === 'ArrowDown') throwPotato();
        });
    </script>
</body>
</html>
